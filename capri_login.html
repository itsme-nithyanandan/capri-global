<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capri Global — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#1A4F3A;--accent2:#2E7D52;--gold:#C8A852;--gold-bg:#FBF6E8;
  --bg:#F2EFE8;--surface:#FDFCF9;--border:#E0DDD5;--border2:#CAC7BC;
  --text:#1C1A14;--muted:#7A7669;
  --green-bg:#E8F5EE;--green-txt:#155E35;
  --red-bg:#FEE8E8;--red-txt:#B91C1C;
  --r:12px;--r-sm:8px;
}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

/* ── CARD ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  width:100%;
  max-width:420px;
  box-shadow:0 4px 24px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);
  overflow:hidden;
}

/* ── HEADER ── */
.card-header{
  background:var(--accent);
  padding:32px 32px 28px;
  text-align:center;
  position:relative;
}
.header-pattern{
  position:absolute;inset:0;
  background:radial-gradient(circle at 80% 20%, rgba(200,168,82,.15) 0%, transparent 60%),
             radial-gradient(circle at 20% 80%, rgba(255,255,255,.05) 0%, transparent 50%);
}
.logo-ring{
  width:56px;height:56px;border-radius:50%;
  background:rgba(255,255,255,.12);
  border:1.5px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;
  position:relative;z-index:1;
}
.logo-ring i{font-size:26px;color:var(--gold)}
.brand-name{
  font-family:'Fraunces',serif;
  font-size:22px;font-weight:500;
  color:white;letter-spacing:.01em;
  position:relative;z-index:1;
  line-height:1.2;
}
.brand-sub{
  font-size:12px;color:rgba(255,255,255,.55);
  margin-top:4px;letter-spacing:.04em;
  text-transform:uppercase;
  position:relative;z-index:1;
}
.brand-badge{
  display:inline-block;
  background:var(--gold);color:#1C1A14;
  font-size:9px;font-weight:700;
  padding:3px 10px;border-radius:10px;
  margin-top:10px;letter-spacing:.06em;
  text-transform:uppercase;
  position:relative;z-index:1;
}

/* ── FORM BODY ── */
.card-body{padding:28px 32px 32px}

.form-title{
  font-size:18px;font-weight:500;
  color:var(--text);margin-bottom:4px;
}
.form-sub{
  font-size:13px;color:var(--muted);
  margin-bottom:24px;line-height:1.5;
}

.field{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.field label{
  font-size:12px;font-weight:500;color:var(--text)
}
.input-wrap{position:relative}
.input-wrap i{
  position:absolute;left:12px;top:50%;
  transform:translateY(-50%);
  font-size:16px;color:var(--muted);
  pointer-events:none;
}
.input-wrap input{
  width:100%;
  padding:10px 44px 10px 38px;
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  font-size:14px;
  background:var(--surface);
  color:var(--text);
  font-family:inherit;
  transition:border-color .15s,box-shadow .15s;
}
.input-wrap input:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(26,79,58,.08);
}
.input-wrap input.err{
  border-color:var(--red-txt);
  box-shadow:0 0 0 3px rgba(185,28,28,.08);
}
.toggle-pw{
  position:absolute;right:0;top:0;bottom:0;
  width:40px;
  background:none;border:none;
  cursor:pointer;color:var(--muted);
  font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:color .15s;
  border-radius:0 var(--r-sm) var(--r-sm) 0;
}
.toggle-pw:hover{color:var(--text);background:rgba(0,0,0,.03)}

.field-err{
  font-size:11px;color:var(--red-txt);
  font-weight:500;display:none;
}
.field-err.show{display:block}

/* ── ALERT ── */
.alert{
  padding:10px 14px;border-radius:var(--r-sm);
  font-size:13px;line-height:1.5;
  display:none;margin-bottom:16px;
  align-items:flex-start;gap:8px;
}
.alert.show{display:flex}
.alert-err{background:var(--red-bg);border:1px solid #FCA5A5;color:var(--red-txt)}
.alert-ok {background:var(--green-bg);border:1px solid #6EE7B7;color:var(--green-txt)}
.alert i{font-size:16px;flex-shrink:0;margin-top:1px}

/* ── SUBMIT BUTTON ── */
.btn-login{
  width:100%;padding:12px;
  border-radius:var(--r-sm);
  border:none;
  background:var(--accent);
  color:white;
  font-family:inherit;
  font-size:14px;font-weight:600;
  cursor:pointer;
  transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:8px;
  position:relative;overflow:hidden;
}
.btn-login:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(26,79,58,.25)}
.btn-login:active{transform:translateY(0)}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none}

/* ── SPINNER ── */
.spinner{
  width:18px;height:18px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:white;
  border-radius:50%;
  animation:spin .7s linear infinite;
  display:none;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FOOTER ── */
.card-footer{
  border-top:1px solid var(--border);
  padding:14px 32px;
  text-align:center;
  font-size:12px;color:var(--muted);
}

/* ── REDIRECT SCREEN ── */
.redirect-screen{
  display:none;
  text-align:center;padding:40px 32px;
}
.redirect-icon{
  width:64px;height:64px;border-radius:50%;
  background:var(--green-bg);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;
}
.redirect-icon i{font-size:30px;color:var(--green-txt)}
.redirect-title{
  font-family:'Fraunces',serif;
  font-size:20px;font-weight:500;
  margin-bottom:6px;
}
.redirect-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.role-badge{
  display:inline-block;
  padding:5px 16px;border-radius:20px;
  font-size:12px;font-weight:600;
  margin-bottom:20px;
}

/* ── LOADING BAR ── */
.loading-bar{
  height:3px;background:var(--border);
  border-radius:2px;overflow:hidden;
  margin:0 32px 0;
}
.loading-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--gold));
  border-radius:2px;
  width:0%;
  transition:width .4s ease;
}
</style>
</head>
<body>

<div class="card" id="main-card">

  <!-- HEADER -->
  <div class="card-header">
    <div class="header-pattern"></div>
    <div class="logo-ring"><i class="ti ti-building-bank"></i></div>
    <div class="brand-name">Capri Global<br>Capital</div>
    <div class="brand-sub">Chennai Operations</div>
    <div class="brand-badge">New Car Loans</div>
  </div>

  <!-- LOGIN FORM -->
  <div class="card-body" id="login-form">
    <div class="form-title">Welcome back</div>
    <div class="form-sub">Sign in to access your cases and dashboard</div>

    <!-- Error alert -->
    <div class="alert alert-err" id="alert-err">
      <i class="ti ti-alert-circle"></i>
      <span id="alert-err-txt">Invalid email or password. Please try again.</span>
    </div>

    <!-- Email -->
    <div class="field">
      <label>Email address</label>
      <div class="input-wrap">
        <i class="ti ti-mail"></i>
        <input type="email" id="inp-email" placeholder="yourname@capriglobal.in"
               autocomplete="email" oninput="clearErr()">
      </div>
      <span class="field-err" id="err-email">Please enter your email</span>
    </div>

    <!-- Password -->
    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <i class="ti ti-lock"></i>
        <input type="password" id="inp-password" placeholder="Enter your password"
               autocomplete="current-password" oninput="clearErr()"
               onkeydown="if(event.key==='Enter')doLogin()">
        <button class="toggle-pw" type="button" onclick="togglePw()" id="pw-toggle">
          <i class="ti ti-eye" id="pw-icon"></i>
        </button>
      </div>
      <span class="field-err" id="err-password">Please enter your password</span>
    </div>

    <button class="btn-login" id="btn-login" onclick="doLogin()">
      <div class="spinner" id="spinner"></div>
      <i class="ti ti-login" id="btn-icon"></i>
      <span id="btn-txt">Sign in</span>
    </button>
  </div>

  <!-- LOADING BAR (shown during login) -->
  <div class="loading-bar" id="loading-bar" style="display:none">
    <div class="loading-fill" id="loading-fill"></div>
  </div>

  <!-- SUCCESS / REDIRECT SCREEN -->
  <div class="redirect-screen" id="redirect-screen">
    <div class="redirect-icon"><i class="ti ti-check"></i></div>
    <div class="redirect-title">Signed in successfully</div>
    <div class="redirect-sub" id="redirect-sub">Redirecting you to your workspace...</div>
    <div class="role-badge" id="role-badge"></div>
    <div class="loading-bar" style="margin:0 0 0;max-width:200px;display:block;margin:0 auto">
      <div class="loading-fill" id="redirect-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="card-footer">
    Capri Global Capital · Chennai · <span id="year"></span>
  </div>
</div>

<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://oceldpcobqzvqrlbbvvl.db.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jZWxkcGNvYnF6dnFybGJidnZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MTI1ODksImV4cCI6MjA5NTk4ODU4OX0.ntz3DT6gV2LCcR9fNNGrLdDuxkgLLIIINy_L2Y7cDSQ';

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    autoRefreshToken: true,
    persistSession: true,
    detectSessionInUrl: false,
    storageKey: 'capri_auth'
  }
});
console.log('Supabase client initialised:', SUPABASE_URL);

// ── YEAR ──────────────────────────────────────────────────────────────────────
document.getElementById('year').textContent = new Date().getFullYear();

// ── CHECK IF ALREADY LOGGED IN ────────────────────────────────────────────────
(async () => {
  try {
    const { data: { session } } = await db.auth.getSession();
    if (session) {
      await redirectByRole(session.user.id);
    }
  } catch(e) {
    console.error('Session check failed:', e);
  }
})();

// ── TOGGLE PASSWORD VISIBILITY ────────────────────────────────────────────────
function togglePw() {
  const inp  = document.getElementById('inp-password');
  const icon = document.getElementById('pw-icon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'ti ti-eye-off';
  } else {
    inp.type = 'password';
    icon.className = 'ti ti-eye';
  }
}

// ── CLEAR ERRORS ──────────────────────────────────────────────────────────────
function clearErr() {
  document.getElementById('alert-err').classList.remove('show');
  document.getElementById('inp-email').classList.remove('err');
  document.getElementById('inp-password').classList.remove('err');
  document.getElementById('err-email').classList.remove('show');
  document.getElementById('err-password').classList.remove('show');
}

// ── SHOW ERROR ────────────────────────────────────────────────────────────────
function showErr(msg) {
  document.getElementById('alert-err-txt').textContent = msg;
  document.getElementById('alert-err').classList.add('show');
  document.getElementById('btn-login').disabled = false;
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('btn-icon').style.display = 'inline';
  document.getElementById('btn-txt').textContent = 'Sign in';
  document.getElementById('loading-bar').style.display = 'none';
}

// ── SET LOADING STATE ─────────────────────────────────────────────────────────
function setLoading(on) {
  const btn = document.getElementById('btn-login');
  const spinner = document.getElementById('spinner');
  const icon = document.getElementById('btn-icon');
  const txt = document.getElementById('btn-txt');
  const bar = document.getElementById('loading-bar');
  if (on) {
    btn.disabled = true;
    spinner.style.display = 'block';
    icon.style.display = 'none';
    txt.textContent = 'Signing in...';
    bar.style.display = 'block';
    // animate bar
    setTimeout(() => document.getElementById('loading-fill').style.width = '60%', 50);
  } else {
    btn.disabled = false;
    spinner.style.display = 'none';
    icon.style.display = 'inline';
    txt.textContent = 'Sign in';
    bar.style.display = 'none';
    document.getElementById('loading-fill').style.width = '0%';
  }
}

// ── MAIN LOGIN ────────────────────────────────────────────────────────────────
async function doLogin() {
  clearErr();
  const email    = document.getElementById('inp-email').value.trim();
  const password = document.getElementById('inp-password').value;

  // Basic validation
  if (!email) {
    document.getElementById('inp-email').classList.add('err');
    document.getElementById('err-email').classList.add('show');
    document.getElementById('inp-email').focus();
    return;
  }
  if (!password) {
    document.getElementById('inp-password').classList.add('err');
    document.getElementById('err-password').classList.add('show');
    document.getElementById('inp-password').focus();
    return;
  }

  setLoading(true);

  try {
    // 1. Sign in with Supabase Auth
    const { data: authData, error: authErr } =
      await db.auth.signInWithPassword({ email, password });

    if (authErr) {
      console.error('Auth error:', authErr);
      if (authErr.message.toLowerCase().includes('invalid') || authErr.message.toLowerCase().includes('credentials')) {
        showErr('Incorrect email or password. Please check and try again.');
      } else if (authErr.message.toLowerCase().includes('confirm')) {
        showErr('Email not confirmed. Please contact the city head.');
      } else if (authErr.message.toLowerCase().includes('network') || authErr.message.toLowerCase().includes('fetch')) {
        showErr('Network error — check your internet connection and try again.');
      } else {
        showErr(authErr.message);
      }
      return;
    }

    // 2. Get user role from users table
    const { data: userData, error: userErr } = await supabase
      .from('users')
      .select('id, name, role, color')
      .eq('id', authData.user.id)
      .single();

    if (userErr || !userData) {
      showErr('Account not set up yet. Please contact the city head.');
      await db.auth.signOut();
      return;
    }

    // 3. Complete loading bar
    document.getElementById('loading-fill').style.width = '100%';
    await new Promise(r => setTimeout(r, 400));

    // 4. Show success screen
    showSuccess(userData);

    // 5. Redirect after short delay
    setTimeout(() => redirectByRole(authData.user.id, userData), 1500);

  } catch (err) {
    showErr('Error: ' + (err.message || JSON.stringify(err)));
    console.error('Login error:', err);
  }
}

// ── SHOW SUCCESS SCREEN ───────────────────────────────────────────────────────
function showSuccess(user) {
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('loading-bar').style.display = 'none';
  document.getElementById('redirect-screen').style.display = 'block';

  const roleLabels = {
    city_head: 'City Head',
    bm:        'Branch Manager',
    rm:        'Relationship Manager'
  };
  const roleColors = {
    city_head: { bg:'#E8F5EE', color:'#155E35' },
    bm:        { bg:'#DBEAFE', color:'#1E3A8A' },
    rm:        { bg:'#EDE9FE', color:'#5B21B6' }
  };
  const rolePages = {
    city_head: 'Capri_Global_CityHead_Dashboard_v2.html',
    bm:        'Capri_Global_CityHead_Dashboard_v2.html',
    rm:        'capri_customer_form.html'
  };

  const badge = document.getElementById('role-badge');
  const rc = roleColors[user.role] || roleColors.rm;
  badge.style.background = rc.bg;
  badge.style.color = rc.color;
  badge.textContent = `${user.name}  ·  ${roleLabels[user.role] || user.role}`;

  document.getElementById('redirect-sub').textContent =
    `Welcome back, ${user.name.split(' ')[0]}. Taking you to your workspace...`;

  // Animate redirect fill
  setTimeout(() => {
    document.getElementById('redirect-fill').style.width = '100%';
  }, 100);
}

// ── REDIRECT BY ROLE ──────────────────────────────────────────────────────────
async function redirectByRole(userId, userData) {
  // If userData not passed, fetch it
  if (!userData) {
    const { data } = await supabase
      .from('users')
      .select('id, name, role, color')
      .eq('id', userId)
      .single();
    userData = data;
  }
  if (!userData) return;

  // Store in sessionStorage for other pages to read
  sessionStorage.setItem('capri_user', JSON.stringify(userData));

  // Route by role
  if (userData.role === 'city_head' || userData.role === 'bm') {
    window.location.href = 'Capri_Global_CityHead_Dashboard_v2.html';
  } else {
    window.location.href = 'capri_customer_form.html';
  }
}

// ── LISTEN FOR AUTH STATE CHANGES ─────────────────────────────────────────────
db.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_OUT') {
    sessionStorage.removeItem('capri_user');
  }
});
</script>
</body>
</html>
